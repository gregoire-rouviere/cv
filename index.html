<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grégoire Rouvière — CV</title>
  <!-- Redirect straight to the PDF. Change the filename here if you rename the PDF;
       the QR code keeps pointing at this page, so it never has to be reprinted. -->
  <meta http-equiv="refresh" content="0; url=cv.pdf">
  <link rel="canonical" href="cv.pdf">
  <style>
    :root { --accent: #004F90; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; font-family: -apple-system, BlinkMacSystemFont,
      "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1a1a1a;
      background: #f6f8fa; padding: 24px;
    }
    .card { text-align: center; max-width: 420px; }
    h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
    p { color: #555; margin: .25rem 0 1.5rem; }
    a.btn {
      display: inline-block; background: var(--accent); color: #fff;
      text-decoration: none; padding: .7rem 1.4rem; border-radius: 8px;
      font-weight: 600;
    }
    a.btn:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Grégoire Rouvière</h1>
    <p>Opening CV… If it doesn't open automatically:</p>
    <a class="btn" href="cv.pdf">Open the CV (PDF)</a>
  </div>
</body>
</html>
